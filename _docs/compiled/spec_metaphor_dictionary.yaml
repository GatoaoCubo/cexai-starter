  | "city planner" | city | N07 orchestrator | kc_lens_city.md |

  | "zoning restriction" | city | guardrail | kc_lens_city.md |

  | "metabolic cycle" | biology | 8F pipeline | kc_lens_biology.md |

  | "immune checkpoint" | biology | F7 GOVERN | kc_lens_biology.md |

  | "hormone signal" | biology | GDP | kc_lens_biology.md |

  | "quest execution" | game | 8F pipeline | kc_lens_game.md (extends game architecture above) |

