exchange_rebrand_metaphors_2026_04_21: '| User says | System means | Industry term | CEX implementation | Teach? |

  |-----------|-------------|---------------|-------------------|--------|

  | exchange | typed artifact sharing across instances | knowledge sharing protocol (federated learning, model merging) |
  spec_exchange_protocol.md -- git-based pull model with quality gates | YES -- "Knowledge sharing protocol, not file transfer"
  |

  | artificial sin | agent behavioral bias under ambiguity | agent personality / behavioral bias (alignment, RLHF reward shaping)
  | nucleus_def `sin_lens` field -- 7 canonical sins drive optimization heuristic | YES -- "Behavioral bias, like RLHF reward
  signal but cultural" |

  | vertical nucleus | domain-specialized AI department (N08+) | domain-specialized agent department (multi-agent architecture)
  | `N{XX}_{domain}/` -- full 12P fractal with nucleus_def, agent_card, vocabulary | YES -- "Agent department, not just an
  agent -- 12 pillars of capability" |

  | assimilation | importing and integrating external artifacts | integration / onboarding (CI/CD, federated learning) | cex_doctor
  validates + cex_compile integrates + retriever rebuilds | YES -- "Integration with quality gates, not blind copy" |

  | neuroplastic | system adapts to imported knowledge | adaptive / extensible (plugin architecture, online learning) | intent_resolver
  + prompt_compiler auto-adapt to new kinds and vocabulary | YES -- "Adaptive architecture, like a plugin system that rewires
  routing" |

  | knowledge asset | configured CEXAI instance with compounding value | knowledge asset (knowledge management, intellectual
  capital) | CEX + brand + typed artifacts + overnight flywheel = appreciating asset | YES -- "Knowledge asset, not digital
  asset (avoids crypto connotation)" |

  | exchange unit | self-describing shareable artifact | artifact / package (npm, PyPI, MLflow registry) | .md with YAML frontmatter
  (artifact) or N{XX}/ directory (nucleus package) | YES -- "Package when it''s a nucleus, artifact when it''s a single file"
  |'
rules:
- 'Artifacts, code, docs: use "Industry term" column. ALWAYS.'
- 'User input: accept "User says" column, translate silently.'
- 'This dictionary: the ONLY place both columns coexist.'
- 'Llama-7B test: if the term needs this dictionary to be understood, it''s wrong for artifacts.'
- 'Rename cascade: changing a term requires CRUD across all files that reference it. See `N07_admin/P10_memory/terminology_standardization.md`
  for the full map.'
- 'Didactic protocol: check `N07_admin/P10_memory/taught_terms_registry.md` before teaching. Teach once per term, never repeat.
  See N02''s didactic protocol spec for format guidelines.'
