  > City: `N04_knowledge/P01_knowledge/kc_lens_city.md`

  > Biology: `N04_knowledge/P01_knowledge/kc_lens_biology.md`

  > Game: `N04_knowledge/P01_knowledge/kc_lens_game.md`

  > Master index (all lenses): `N04_knowledge/P01_knowledge/kc_lens_index.md`


  | User says | Lens | CEX concept | Full mapping |

  |-----------|------|------------|--------------|

  | "assembly line" | factory | 8F pipeline | kc_lens_factory.md |

  | "QA inspection" | factory | F7 GOVERN | kc_lens_factory.md |

  | "work order" | factory | handoff | kc_lens_factory.md |

  | "floor manager" | factory | N07 orchestrator | kc_lens_factory.md |

