signal_without_deliverable_gate: "New BLOCKING gate in cex_doctor.py:\n\nIF signal.status == \"complete\" AND artifact_on_disk\
  \ == false:\n  VERDICT: FAIL (BLOCKING)\n  MESSAGE: \"Nucleus signaled complete but artifact not found at {path}\"\n  ACTION:\
  \ do not trust signal, do not count as delivered\n\nThis catches the Haiku/Sonnet failure pattern at the toolchain level."
6_tool_based_council_f7c: ''
architecture_zero_api_cost: 'Judge 1: cex_doctor.py   →  structural health (frontmatter, density, wiring)

  Judge 2: cex_score.py    →  structural score (Layer 1 only, skip semantic)

  Judge 3: cex_compile.py  →  parse integrity (YAML, wikilinks, schema)


  Consensus:  all 3 PASS → artifact accepted

  Divergence: any FAIL while others PASS → flag for human review

  All FAIL:   artifact rejected, return to F6'
cross_nucleus_review_within_existing_session_2k_tokens: 'When multiple nuclei are running (grid dispatch):

  - The PRODUCING nucleus does NOT validate its own output

  - N05 (operations) validates all other nuclei''s artifacts

  - N05 is already booted and running -- zero marginal API cost

  - Review uses the scoring_rubric, not free-form LLM judgment'
deferred_council_async_for_solo_dispatch: 'When only 1 nucleus runs (no N05 available):

  - Artifact lands with structural_score only

  - Next `/evolve` sweep runs semantic scoring in batch

  - User already pays for the /evolve session -- council piggybacks'
