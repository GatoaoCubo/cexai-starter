9_section_5_dispatch_sh_integration_w2_podcast_oss_v2: 'The decomposed pipeline is exposed as a first-class dispatch mode:


  bash _spawn/dispatch.sh decompose <nucleus> "<task>" [-1 model] [-2 model] [--dry-run] [--skip-stage-3]'
wiring_overview: "dispatch.sh decompose\n       |\n       v\n_tools/cex_decompose.py            <-- orchestrator (Python,\
  \ ASCII-only)\n       |\n       +-- Stage 1: subprocess(_tools/cex_8f_runner.py --stage 1 --mode B ...)\n       |      env:\
  \ CEX_DECOMPOSE_STAGE=1, CEX_MODEL_OVERRIDE=<stage_1_model>\n       |      output: .cex/runtime/packages/pp_<kind>_<task_id>.md\n\
  \       |\n       +-- Stage 2: subprocess(_tools/cex_8f_runner.py --stage 2 --mode B\n       |                       --prompt-package\
  \ <pkg> --execute ...)\n       |      env: CEX_DECOMPOSE_STAGE=2, CEX_MODEL_OVERRIDE=<stage_2_model>\n       |      output:\
  \ artifact under target nucleus\n       |\n       +-- Stage 3: deterministic tools (no LLM)\n              cex_doctor.py\
  \ + cex_compile.py + signal_writer.write_signal(...)"
stage_model_resolution: "- `_tools/cex_decompose.py` reads `tiers.decompose` from\n  `.cex/config/nucleus_models.yaml`:\n\
  \  - `stage_1` (default `claude-opus-4-7`)\n  - `stage_2` (default `claude-haiku-4-5-20251001`)\n  - `stage_2_fallback`\
  \ (ordered list, e.g. `[gemini-2.5-flash-lite, qwen3:8b]`)\n- Override precedence at runtime: CLI flag > env var\n  (`CEX_DECOMPOSE_STAGE{1,2}_MODEL`)\
  \ > YAML > default.\n- `_tools/cex_boot_pipeline.py` reads `CEX_DECOMPOSE_STAGE` and applies the\n  matching `tiers.decompose.stage_{N}`\
  \ override on the spawned nucleus's model."
stage_protocol_signal_handshake: '| Stage | Trigger          | Success signal              | On failure                                |

  |-------|------------------|-----------------------------|-------------------------------------------|

  | 1     | dispatch.sh      | `pp_*.md` written under packages/ | exit 2; orchestrator stops               |

  | 2     | orchestrator     | artifact on disk            | exit 3 after fallback chain exhausted     |

  | 3     | orchestrator     | `cex_doctor` 0 FAILs + git commit + `signal_writer.write_signal(nucleus, "complete", 9.0)`
  | exit 4 (FAIL surfaced to N07) |'
acceptance_for_9_w2: "- `bash _spawn/dispatch.sh decompose n03 \"test\" --dry-run` exits 0 and prints\n  the intended Stage\
  \ 1 / Stage 2 / Stage 3 subprocess calls.\n- `python _tools/cex_decompose.py --nucleus n04 --task \"...\"` runs end-to-end\n\
  \  and produces a single git commit covering the new artifact.\n- `git log --since=\"N seconds\"` shows ONE commit (not\
  \ 3), Stage 3 batches all\n  changes including the prompt_package metadata.\n- All new code (`cex_decompose.py`) passes\
  \ ASCII sanitizer and PEP8."
