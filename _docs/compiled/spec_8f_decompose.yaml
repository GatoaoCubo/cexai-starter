1_problem_statement: 'STRESS_TEST results (2026-04-28):


  | Runtime   | Delivered | Time  | Quality | Failure Mode                    |

  |-----------|-----------|-------|---------|---------------------------------|

  | Opus      | 6/6       | ~8m   | 8.5-9.1 | None                            |

  | Sonnet    | 5/6       | ~8.5m | 8.8 avg | Git lock contention (1 nucleus) |

  | Haiku v1  | 3/6       | ~3m   | 9.0*    | Signal without deliverable      |

  | Haiku v2  | 2/6       | ~8m   | 8.5-9.1 | Same (race fix did not help)    |

  | Gemini    | 2/6       | 25m+  | 8.5 avg | Hallucinated data + hung        |

  | Codex     | 0/6       | ~3m   | n/a     | Destructive (modifies existing) |

  | Ollama    | 0/6       | ~5m   | n/a     | Zero output                     |


  Root cause: only Opus/Sonnet can execute the full 8F pipeline autonomously.

  Cheaper models fail at different stages but could succeed at isolated stages.'
2_solution_3_stage_decomposition: "STAGE 1: THINK     (F1 CONSTRAIN + F2 BECOME + F3 INJECT + F4 REASON)\n  Who:   Opus /\
  \ Sonnet (the model already running as N07 or nucleus)\n  Input: user intent + kind + pillar\n  Output: PROMPT PACKAGE (.md\
  \ structured file)\n  Cost:  ~2K tokens (reasoning only, no generation)\n\nSTAGE 2: GENERATE  (F6 PRODUCE)\n  Who:   Any\
  \ model (Haiku / Gemini Flash / Ollama fine-tuned)\n  Input: prompt package (complete instructions + data + template)\n\
  \  Output: raw artifact (.md with frontmatter + body)\n  Cost:  model-dependent (cheapest available)\n\nSTAGE 3: VALIDATE\
  \  (F7 GOVERN + F8 COLLABORATE)\n  Who:   Tool council (cex_doctor + cex_score + cex_compile)\n        + cross-nucleus review\
  \ (N05 validates N03 output)\n  Input: raw artifact\n  Output: scored artifact (structural_score) + git commit + signal\n\
  \  Cost:  0 tokens (tools only) or ~2K (cross-nucleus, within session)"
