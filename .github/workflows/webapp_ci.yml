# CEXAI Tenant -- Webapp CI
# =========================
# Builds + tests the two Next.js surfaces on every push / PR.
# Matrix over apps/public_site and apps/dashboard_web.
# Steps per app: npm ci -> build -> vitest (if present) -> tsc --noEmit.

name: Webapp CI

on:
  push:
    paths:
      - 'apps/public_site/**'
      - 'apps/dashboard_web/**'
      - '.github/workflows/webapp_ci.yml'
  pull_request:
    paths:
      - 'apps/public_site/**'
      - 'apps/dashboard_web/**'
      - '.github/workflows/webapp_ci.yml'

# Least-privilege: read-only token.
permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        app:
          - apps/public_site
          - apps/dashboard_web
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install (npm ci)
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test (vitest, if present)
        run: npm run test --if-present

      - name: Typecheck (tsc --noEmit)
        run: npx --no-install tsc --noEmit
