as_6_trilhas_can_nicas_lanes_lane: '| Slug (frontmatter) | Rótulo em PT-BR | O que cobre |

  |---------------------|-----------------|--------------|

  | `firmographics` | Firmografia (CNPJ/IBGE) | Razão social, CNAE, porte, situação cadastral |

  | `social_signal` | Sinal Social (App Store / Reddit / YouTube) | Avaliações, menções, tom geral em plataformas públicas
  |

  | `reputation` | Reputação (Reclame Aqui) | Índice de reputação, % respondidas/resolvidas |

  | `pt_sentiment` | Sentimento em PT | Positivo/neutro/negativo sobre texto já coletado |

  | `seo_keywords` | Palavras-chave de SEO | Termos + intenção de busca relacionados a semente |

  | `multi_perspective_questions` | Perguntas Multi-Perspectiva | Perguntas por papel (cliente/concorrente/investidor-regulador/parceiro)
  |


  `lanes` deve conter exatamente estas 6 entradas, nesta ordem, sempre -- mesmo quando o status é `blocked` ou `skipped`.
  O campo `status` de cada uma usa o enum técnico em inglês (`ok` / `blocked` / `skipped`), já estabelecido na descrição original
  desta capacidade -- preservado aqui como valor de contrato, não traduzido:

  - `ok` -- dado real foi coletado e citado com fonte + data de acesso.

  - `blocked` -- a fonte existe, mas não foi acessível neste ambiente/sessão (paywall, anti-bot, login exigido, Action indisponível).

  - `skipped` -- a trilha não se aplica a este tipo de semente (ex.: firmografia para uma semente `palavra_chave` sem empresa
  associada).'
semente_x_trilhas_aplic_veis: '| `seed_type` | Firmografia | Sinal Social | Reputação | Sentimento PT | SEO | Perguntas Multi-Perspectiva
  |

  |-------------|:---:|:---:|:---:|:---:|:---:|:---:|

  | `cnpj` | aplica | aplica | aplica | aplica | opcional | aplica |

  | `empresa` | aplica | aplica | aplica | aplica | opcional | aplica |

  | `marca` | aplica se resolve p/ pessoa jurídica | aplica | aplica | aplica | aplica | aplica |

  | `produto` | tipicamente `skipped` | aplica | aplica se há marca associada | aplica | aplica | aplica |

  | `palavra_chave` | `skipped` | aplica se há entidade nomeada | tipicamente `skipped` | aplica se há entidade nomeada |
  aplica (trilha primária) | aplica |

  | `store_id` | aplica se resolve p/ CNPJ do publicador | aplica (trilha primária) | aplica se há empresa identificável |
  aplica | opcional | aplica |


  "Aplica" significa que a trilha DEVE ser tentada; o resultado ainda pode ser `blocked`. Uma trilha marcada como tipicamente
  `skipped` para um `seed_type` pode virar `ok` se o usuário fornecer dado adicional (ex.: uma `palavra_chave` que o usuário
  liga explicitamente a uma empresa).'
padr_o_de_id: '`^p01_ru_[a-z][a-z0-9_]+\.md$`'
estrutura_do_corpo:
- Sumário Executivo -- semente, seed_type, data, trilhas ok, achado principal
- Firmografia -- razão social, CNAE, porte, situação cadastral, município/UF
- Sinal Social -- loja de app, Reddit, YouTube
- Reputação -- índice Reclame Aqui, % respondidas/resolvidas
- Sentimento em PT -- distribuição positivo/neutro/negativo com trecho-fonte
- Palavras-chave de SEO -- termos, intenção, volume/tendência
- Perguntas Multi-Perspectiva -- >= 3 papéis distintos
- Tabela de Status por Trilha -- as 6, com motivo quando `blocked`/`skipped`
- Procedência Consolidada -- fontes, método de coleta, confiança geral
- Limitações e Próximos Passos
restri_es:
- O ID deve corresponder exatamente a `^p01_ru_[a-z][a-z0-9_]+\.md$`.
- '`analysis_date` deve estar em ISO 8601.'
- '`lanes` deve ter exatamente 6 entradas, uma por trilha canônica, sempre nesta ordem.'
- 'Todo `status: ok` exige >= 1 fonte com data de acesso no corpo do relatório.'
- '`coverage_score` deve bater com a contagem real de trilhas `ok` dividida por 6.'
- Nenhum valor de firmografia, reputação ou volume de SEO sem fonte citada -- se não há fonte, a trilha é `blocked`, não `ok`.
- Sentimento em PT nunca aparece sem um trecho-fonte apontando para a trilha de origem (Sinal Social ou Reputação).
- O tamanho do arquivo não deve exceder 6144 bytes (maior que o teto padrão de 5120B de um kind de trilha única, dado que
  este kind cobre 6 trilhas).
- O campo `quality` deve ser `null` (somente peer review).
