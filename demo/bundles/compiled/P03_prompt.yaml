fase_1_pesquisa:
- 'Analisar tendências de mercado para modelos de precificação SaaS (ex.: freemium, em tiers).'
- Fazer benchmark dos tiers de assinatura de concorrentes quanto a paridade de funcionalidades e preço.
- 'Identificar as funcionalidades essenciais a incluir em cada tier (ex.: chamadas de API, limites de armazenamento).'
- Priorizar funcionalidades com base no valor para o cliente e na viabilidade técnica.
- Segmentar os usuários-alvo por padrão de uso (leve, médio, enterprise).
- 'Revisar requisitos legais de precificação (ex.: conformidade fiscal, políticas de reembolso).'
fase_2_composi_o:
- 'Definir o nome do tier usando o campo `name` do SCHEMA.md (ex.: "Basic", "Pro").'
- Definir a estrutura de preço com `price_id`, `currency` e `recurring_interval`.
- 'Mapear funcionalidades para tiers em `feature_matrix` (ex.: "usuários ilimitados" -> "Pro").'
- 'Especificar restrições via `constraints` (ex.: "máximo de 100 chamadas de API/mês").'
- Vincular às configurações do gateway de pagamento em `external_ids`.
- Adicionar a descrição do tier usando a seção `summary` do OUTPUT_TEMPLATE.md.
- 'Validar dependências entre funcionalidades (ex.: "Pro" requer as funcionalidades do "Basic").'
- Documentar os fluxos de onboarding de cada tier em `user_journey`.
- Finalizar o artefato com os metadados `created_at` e `updated_at` do SCHEMA.md.
fase_3_valida_o:
- '[ ] Checar a conformidade com o schema via validador de JSON schema.'
- '[ ] Confirmar a consistência de preço entre todos os tiers e moedas.'
- '[ ] Garantir que a feature_matrix esteja alinhada com a implementação técnica.'
- '[ ] Verificar a lógica de aplicação das restrições nos sistemas de backend.'
- '[ ] Conduzir testes com usuários reais usando configurações de tier de exemplo.'
