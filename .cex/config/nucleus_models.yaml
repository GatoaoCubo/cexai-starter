# CEX Nucleus Model Configuration
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# Each nucleus reads its CLI + model from here.
# Boot scripts and spawn_grid consume this file.
#
# CHANGE THESE to match your subscriptions/budget.
# Low-budget? Use ollama + local models everywhere.
# Premium? Use the best cloud model per domain.
#
# CLI options:  claude | gemini | codex | ollama
# Model: any model string your CLI supports
#
# mcps field convention:
#   - ".mcp-n0X.json"  -> per-nucleus overlay path (Test-Path checked at boot;
#                          falls back to root .mcp.json if the overlay is missing)
#   - ""               -> nucleus runs WITHOUT MCP (no overlay, no root fallback)
#   The .mcp-n0X.json files are gitignored (see .gitignore: ".mcp-n*.json").
#   Most users only have root .mcp.json -- the per-nucleus overlay paths
#   declared below are aspirational, used only if a contributor creates them.
#
# Decision: 2026-04-02 — /guide session, user-confirmed
# Updated: 2026-04-28 — STRESS_TEST_DECOMPOSE evidence:
#   Opus:   9/9 Mode A, 10/10 structural (gold)
#   Sonnet: 9/9 Mode A, 10/10 structural (silver, ~same as gold)
#   Haiku:  9/9 Mode A, 9/10 structural  (production-viable! was 2/6 due to format bug)
#   Ollama: Mode B 7/10, Mode C 6/10 (3.2 tok/s CPU-only, ~10min/task)
#   Gemini: SKIPPED (free tier hangs)
#   Codex:  PENDING
# Routing insight: Haiku handles full 8F. Use it for cost savings (~10x cheaper).
# Override per-dispatch: the Task tool (in-session) solo n03 -m claude-haiku-4-5
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ===================================================================
# MODEL ALIASES -- dynamic "*_latest" resolution (single source of truth)
# ===================================================================
# Plan: opus_latest_dynamic | Decisions: decision_manifest_opus_latest_dynamic.yaml
#
# Every resolver (cex_model_resolver.py, cex_boot_pipeline.py, resolve_model.ps1)
# reads THIS block to expand the shorthand in each nucleus block (model: opus)
# into a full API model id. Bump a version here ONCE and every boot follows --
# no per-file edits, ever (this is the fix for "stuck on 4-7 for weeks").
#
# Resolution precedence (highest to lowest):
#   1. CEX_MODEL_OVERRIDE  env -> literal model id (per-dispatch override)
#   2. CEX_OPUS_TIER       env -> if a literal id, PIN opus to it (rollback);
#                                 if unset or "latest", follow opus_latest below
#   3. model_discovery.json     -> fresh (<24h) cached probe values OVERRIDE this
#                                  block (writer = cex_model_updater --discover, N05)
#   4. model_aliases: (this)    -> the machine source of truth
#   5. baked-in baseline const  -> claude-opus-4-8 (DP4 net; boot NEVER hard-fails)
#
# Pin / rollback: set CEX_OPUS_TIER=claude-opus-4-7  OR
#   python _tools/cex_model_updater.py --pin claude-opus-4-7
model_aliases:
  # --- Anthropic ---
  fable_latest:  claude-fable-5        # newest family (founder 2026-06-11)
  opus_latest:   claude-opus-4-8        # was 4-7; THIS is the fix
  sonnet_latest: claude-sonnet-4-6
  haiku_latest:  claude-haiku-4-5-20251001
  # --- Google ---
  gemini_pro_latest:        gemini-2.5-pro
  gemini_flash_latest:      gemini-2.5-flash
  gemini_flash_lite_latest: gemini-2.5-flash-lite   # cheap tier (W6 google ladder)
  # --- OpenAI (Codex CLI) ---
  gpt_latest:      gpt-5.2
  gpt_mini_latest: gpt-5-mini

# ===================================================================
# RUNTIME CAPABILITY MATRIX (W4 WIRE_DORMANT)
# ===================================================================
# Per-runtime capability flags consumed by
# cex_router_v2.filter_backends_by_capabilities (the require_parameters-style
# feature-filter). Mirrors the model_provider kind `capabilities:` schema block
# (N00_genesis/P02_model/_schema.yaml).
#
# RULES (degrade-never + never-fabricate):
#   - ONLY publicly-documented, verifiable capability facts are declared here.
#   - An UNSET capability == unknown -> the runtime is NEVER filtered out for it
#     (missing data != unsupported). Only an explicit `false` (or `0` for an int
#     field) excludes a runtime from a request that REQUIRES that capability
#     (fail-closed, no emulation).
#   - Kill-switch: CEX_CAPABILITY_FILTER=0 -> the filter is a no-op (routing is
#     byte-identical to pre-W4).
#   - Keyed by runtime (the `cli:` value). Left unset where model-dependent.
runtime_capabilities:
  claude:        # Anthropic Claude API -- docs.anthropic.com (tool use, vision, streaming)
    tool_calling: true
    structured_output: true
    vision: true
    streaming: true
    json_mode: true
    parallel_tool_calls: true
    context_window: 200000
  gemini:        # Google Gemini API -- ai.google.dev (function calling, multimodal, responseSchema)
    tool_calling: true
    structured_output: true
    vision: true
    streaming: true
    json_mode: true
    parallel_tool_calls: true
    context_window: 1000000   # Gemini 2.5 family (~1M input tokens)
  codex:         # OpenAI GPT via Codex CLI -- platform.openai.com (tools, structured outputs, vision)
    tool_calling: true
    structured_output: true
    vision: true
    streaming: true
    json_mode: true
    parallel_tool_calls: true
    # context_window/max_output_tokens UNSET: not asserting an exact gpt-5.2 figure.
  ollama:        # Local Ollama runtime -- ollama.com/blog (tool calling + structured outputs + streaming)
    tool_calling: true
    structured_output: true
    streaming: true
    json_mode: true
    # vision UNSET: model-dependent (the configured local models qwen3/gemma are text-only;
    #   Ollama CAN run vision models, so not declared false -> stays unknown/kept).
    # parallel_tool_calls/context_window/max_output_tokens UNSET: per-model.

# --- N07: Orchestrator (this session — claude) ---
n07:
  cli: claude
  # FABLE_SELF_HEAL (2026-06-13): self-healing via cex_model_resolver._fable_blocked
  # / resolve_model.ps1 -- auto-uses fable when the gate clears, opus while blocked.
  # claude-fable-5 is server-blocked today (~/.claude.json tengu-model-error-overrides
  # carries a claude-fable-5 key); the resolver substitutes opus until Anthropic drops
  # that key, then snaps back to fable with NO edit. Force fable: CEX_FABLE_FORCE=1.
  model: fable
  flags: "--dangerously-skip-permissions --permission-mode bypassPermissions --no-chrome"
  mcps: ".mcp-n07.json"
  context: 1000000
  domain: orchestration
  tier: full_8f
  default_mode: A
  # fallback_chain: ordered list consumed by cex_cli_resolver.py.
  # Primary fails (quota/offline/missing) -> next entry is tried.
  # Rule: never hardcode the CLI -- this YAML IS the config surface.
  fallback_chain:
    - {cli: gemini, model: gemini-2.5-flash-lite, flags: "--yolo", tier: f6_generation}
    - {cli: codex,  model: gpt-5.2,           flags: "--dangerously-bypass-approvals-and-sandbox", tier: preflight_aux}
    - {cli: ollama, model: gemma4:26b,        flags: "", tier: unsupported}
    - {cli: ollama, model: qwen3:8b,         flags: "", tier: unsupported}
  # Legacy single-fallback field -- kept for backward compat with older tools.
  fallback:
    cli: ollama
    model: gemma4:26b
  fallback_local:
    cli: ollama
    model: gemma4:26b
  notes: "Maestro. Best reasoning for dispatch decisions. Gemma4 MoE as local fallback (4B active, fits 16GB)."

