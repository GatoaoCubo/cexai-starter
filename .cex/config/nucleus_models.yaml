# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# GRID LOAD DISTRIBUTION (6 simultaneous during /grid):
#
#   Claude/Opus:  N03 + N05 + N07 = 3 (deep reasoning + browser automation)
#   Claude/Sonnet: N01 + N02 + N04 + N06 = 4 (structured tasks)
#   N07 runs in separate session (doesn't compete with grid)
#
# 2026-04-13: Budget optimization. 7 Opus -> 2 Opus + 5 Sonnet.
# Rationale: Max subscription has token caps. Opus for reasoning-critical
# (orchestration + 8F artifact construction). Sonnet for well-structured domains.
# Preflight (local Ollama or Haiku) pre-compiles context to reduce token burn.
#
# Fallback principle: always cross-provider (claude -> gemini-flash -> codex -> ollama)
# Fallback local: qwen3:14b (N03) / qwen3:8b (all others)
#
# 2026-04-11: Added fallback_chain (ordered list). Consumed by cex_cli_resolver.py
# during `-cli auto` mode in spawn_grid.ps1.
#
# 2026-04-12: Added ollama_api config for tools that call Ollama via OpenAI SDK.
# Verified: qwen3:8b and qwen3:14b both respond at localhost:11434/v1.
# -----------------------------------------------------------------------------------

# --- Preflight Configuration ---
# Pre-compilation phase: cheap/local model assembles context BEFORE nucleus boots.
# Reduces token burn on main model by 60-70%.
# Tool: _tools/cex_preflight.py (reads this config)
preflight:
  enabled: true
  # Strategy: "local" = Ollama only, "cloud" = Haiku only, "hybrid" = local-first + Haiku fallback
  strategy: hybrid
  local:
    cli: ollama
    model: qwen3:14b
    fallback_model: qwen3:8b
    base_url: "http://localhost:11434/v1"
    timeout_seconds: 30
    # Tasks the local model handles (zero Max tokens spent):
    tasks:
      - file_scanning        # list relevant files for the task
      - iso_ranking           # rank 13 ISOs by relevance, pick top 3-5
      - context_dedup         # remove redundant context across sources
      - token_counting        # count tokens before assembly
      - embedding_retrieval   # TF-IDF / embedding similarity search
  cloud:
    cli: claude
    model: claude-haiku-4-5-20251001
    # Haiku is ~60x cheaper than Opus per token
    tasks:
      - semantic_ranking      # when local model ranking is uncertain
      - prompt_compression    # summarize verbose context into dense form
      - relevance_scoring     # score KC/ISO relevance 0-1 for selection
  # Budget: max tokens the preflight phase can consume on cloud model
  cloud_token_budget: 4000
  # Output: compiled prompt written to .cex/cache/preflight/{nucleus}_{task_hash}.json
  cache_dir: ".cex/cache/preflight"
  # Context reduction targets
  targets:
    max_isos_per_build: 5           # from 13 -> top 5 most relevant
    max_kcs_per_build: 3            # from all -> top 3
    max_context_tokens: 15000       # target ceiling after compilation
    original_avg_tokens: 50000      # baseline before preflight

# --- Pre-flight Phase 0: MCP external context gather (N07 gateway) ---
# N07 gathers external context before dispatch so non-Claude runtimes
# (Codex, Gemini, Ollama) receive rich handoffs without live MCP access.
# Tool: _tools/cex_preflight_mcp.py (reads preflight_mcp section below)
# Spec: _docs/specs/spec_preflight_expansion_smart_routing.md
#
# Budget split (DP2): 8K external + 7K ISOs/KCs = 15K total per handoff
# Timeout (DP3): 60s -- generous for network-bound MCP calls
# Strategy (DP4): tiered -- free defaults + optional premium via env keys
preflight_mcp:
  enabled: true
  max_external_tokens: 8192      # DP2: 8K external context budget
  timeout_seconds: 60            # DP3: generous for network-bound calls
  max_queries_per_provider: 3    # max search queries per provider per run
  delay_between_queries_ms: 1000 # rate-limit guard between queries
  audit_log: true                # write .cex/cache/preflight/{hash}_audit.json
  providers:
    github:
      enabled: true
      requires_key: GITHUB_TOKEN
      operations: [search_repositories, search_code, list_issues, get_file_contents]
      notes: "Free. Set GITHUB_TOKEN env var (any GitHub account token)."
    fetch:
      enabled: true
      requires_key: null
      notes: "Direct HTTP GET for specific URLs. No API key needed."
    markitdown:
      enabled: true
      requires_key: null
      notes: "HTML/PDF to markdown via MCP markitdown tool. No API key needed."
    brave_search:
      enabled: false
      requires_key: BRAVE_API_KEY
      notes: "Optional. Free tier: 2000 queries/mo. Set BRAVE_API_KEY in .env."
    firecrawl:
      enabled: false
      requires_key: FIRECRAWL_API_KEY
      notes: "Optional premium. Deep web crawl. Set FIRECRAWL_API_KEY in .env."
  # Graceful degradation: if all providers unavailable, Phase 0 silently skips.
  # The nucleus still receives ISO/KC context from Phase 1+2 (no crash).

# --- Ollama API (OpenAI-compatible endpoint for tool-level access) ---
ollama_api:
  base_url: "http://localhost:11434/v1"
  embed_url: "http://localhost:11434/api/embed"
  models:
    primary: "gemma4:26b"
    heavy: "qwen3:14b"
    light: "qwen3:8b"
    student: "cex-student"
  gpu: "RTX 5070 Ti"
  vram: "16GB"
  parallel: 6  # OLLAMA_NUM_PARALLEL for concurrent grid inference
  notes: "Gemma4 MoE (26B total, 4B active) as primary. Fits 16GB. 6x concurrent via OLLAMA_NUM_PARALLEL."

# --- Secretariat Tier (pre-flight intelligence) ---
# Cheap model that runs BEFORE nucleus dispatch: intent resolution, ISO ranking,
# context selection. First healthy provider wins. Regex is always-available fallback.
# Spec: _docs/specs/spec_secretariat_tier.md
secretariat:
  enabled: true
  timeout_seconds: 30
  intent_confidence_threshold: 0.60
  fallback_chain:
    - provider: ollama
      model: cex-student
      cost: free
      capabilities: [intent, iso_ranking, context_selection]
    - provider: ollama
      model: qwen3:8b
      cost: free
      capabilities: [intent, iso_ranking, context_selection]
    - provider: anthropic
      model: claude-haiku-4-5-20251001
      cost: low
      requires_key: ANTHROPIC_API_KEY
      capabilities: [intent, iso_ranking, context_selection]
    - provider: google
      model: gemini-2.5-flash
      cost: free
      requires_key: GEMINI_API_KEY
      capabilities: [intent, iso_ranking, context_selection]
    - provider: local
      model: cex_intent_resolver
      cost: zero
      capabilities: [intent]
  targets:
    max_isos_per_build: 5
    max_kcs_per_build: 3
    max_context_tokens: 15000

# --- 8F Decomposition Tiers (MISSION_8F_DECOMPOSE) ---
# Machine-readable tier definitions consumed by cex_8f_runner.py and cex_router_v2.py.
# Spec: _docs/specs/spec_8f_decompose.md | Evidence: STRESS_TEST 2026-04-28 (77 runs)
tiers:
  full_8f:
    stages: [F1, F2, F3, F4, F5, F6, F7, F8]
    mode: A
    description: "Full autonomous 8F pipeline. Model handles all reasoning + generation."
    min_score: 9.0
    models: [claude-fable-5, claude-opus-4-8, claude-opus-4-7, claude-sonnet-4-6, claude-haiku-4-5-20251001]
  f6_generation:
    stages: [F6]
    mode: B
    description: "F6 generation only. Opus pre-compiles F1-F4 into prompt_package. Tools handle F7-F8."
    min_score: 7.0
    # DP1 (decision_manifest_glm_bench_2026_07_12.yaml, GLM_BENCH_0712_EXEC):
    # added glm-openwebui/glm-5.2-fast/glm-cpw/glm-flash -- Lane B snippet
    # as-is. Bare glm-5.2 deliberately OMITTED (reasoning-budget fragile,
    # 0-content proven twice; costliest variant; glm-openwebui already
    # aliases it at the litellm layer). See N05_operations/P07_evals/
    # p07_bm_glm_openwebui.md Lane B for the full rationale.
    models: [gemini-2.5-flash-lite, gemini-2.5-flash, gpt-4.1, gpt-5,
             glm-openwebui, glm-5.2-fast, glm-cpw, glm-flash]
    prompt_package_dir: ".cex/runtime/packages"
  preflight_aux:
    stages: []
    mode: B
    description: "Read-only auxiliary tasks. No artifact production. Context gathering only."
    min_score: null
    models: [gpt-5, gpt-4.1]
  local_f6:
    stages: [F6]
    mode: B
    description: "F6 via fine-tuned local model (DEFERRED -- requires MISSION_OLLAMA_F6_FINETUNE)."
    min_score: 7.0
    models: [cex-student, llama3.1:8b]
    status: deferred
  unsupported:
    stages: []
    mode: null
    description: "BLOCKED per STRESS_TEST evidence. Do not dispatch."
    models: [qwen3:14b, gemma4:26b, qwen3:8b]

  # 3-stage 8F decompose tier consumed by:
  #   - _tools/cex_decompose.py    (orchestrator: spawns Stage 1 + Stage 2)
  #   - _tools/cex_boot_pipeline.py (reads CEX_DECOMPOSE_STAGE -> picks model)
  #   - the Task tool (in-session) decompose <nucleus> <task>
  # Spec: _docs/specs/spec_8f_decompose.md (section 5: the Task tool integration)
  decompose:
    description: "3-stage 8F decompose: Sonnet reasoning -> Sonnet generation -> tools (zero LLM in Stage 3). SONNET5_DEFAULT_POLICY 2026-07-01."
    stage_1: claude-sonnet-4-6
    stage_2: claude-sonnet-4-6
    stage_2_fallback: [gemini-2.5-flash-lite, qwen3:8b]
    min_score: 8.0
    prompt_package_dir: ".cex/runtime/packages"

  # --- Cross-provider escalation ladders (W6: MAX_LEVERAGE provider-agnostic) ---
  # The smart-escalation ladder (cex_mentor_swarm.ESCALATION_LADDER) generalized
  # across providers: each ladder climbs cheap -> mid -> premium. A gate-clean
  # artifact scoring below a tier's `floor` is re-produced at the next (stronger)
  # tier; the terminal tier has floor: null (accept whatever it produces).
  # `alias` resolves through model_aliases above (cross-provider -- no hardcoded
  # slug, no "if claude"). The swarm picks the ladder matching the producer
  # model's provider (cex_mentor_swarm.load_escalation_ladder). `claude` is the
  # default and is byte-identical to the pre-W6 hardcoded ladder
  # (haiku>sonnet>opus) -- backward-compat: Claude defaults unchanged.
  # Only providers/models already present in this YAML are used (none invented).
  escalation_ladders:
    claude:
      - {tier: haiku,  alias: haiku,  floor: 7.0}
      - {tier: sonnet, alias: sonnet, floor: 8.0}
      - {tier: opus,   alias: opus,   floor: null}
    google:
      - {tier: flash_lite, alias: gemini_flash_lite, floor: 7.0}
      - {tier: flash,      alias: gemini_flash,      floor: 8.0}
      - {tier: pro,        alias: gemini_pro,        floor: null}
    openai:
      - {tier: gpt_mini, alias: gpt_mini, floor: 7.0}
      - {tier: gpt,      alias: gpt,      floor: null}
    ollama:
      - {tier: light, alias: "ollama/qwen3:8b",  floor: 7.0}
      - {tier: heavy, alias: "ollama/qwen3:14b", floor: null}

