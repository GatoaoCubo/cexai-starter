# vertical_templates.yaml -- Vertical-Template Registry (DATA, not taxonomy)
#
# Owner:   N06 (Commercial -- Strategic Greed)
# Mission: assimilation engine / Wave A / Gap#4 (Stage 0 PURPOSE)
# Read by: _tools/cex_vertical_detect.py (heuristic vertical auto-detect)
#          N06 purpose intake (p03_pt_purpose_intake) + N03 assembler (Wave C)
#
# >>> ZERO-NEW-KINDS CONTRACT <<<
# Kind count stays 303. The 6 "existing" entries map 1:1 to real *_vertical KINDS.
# The 4 "derived_template" entries (consultant / dev_shop / creator / agency) are
# DATA ROWS ONLY -- they are NOT kinds, NOT taxonomy. They never create a
# consultant_vertical / dev_shop_vertical kind. When no entry fits a purpose with
# confidence, the classifier returns derive_from_purpose (see fallback below).
#
# Schema per entry:
#   title                : human label
#   kind                 : the backing *_vertical KIND, or null for derived templates
#   status               : existing | derived_template
#   signals              : weighted keyword/phrase list (multi-word phrase = stronger
#                          signal; the classifier weights by word count).
#                          pt-BR signals are ADDITIVE (all EN signals kept) and written in
#                          ACCENT-FOLDED form (e.g. "manutencao", "solucoes") because callers
#                          fold the input to ASCII before matching (cex_business_shape._fold);
#                          the EN self-test runs on ASCII text and is unaffected.
#   kind_palette         : CEX kinds N03's assembler should seed for this vertical
#   nucleus_palette      : nuclei (N01-N06) most active for this vertical brain
#   monetization_default : the revenue model N06 pre-seeds (commercial layer)
#   icp_hint             : one-line ideal-customer hint for the user_model purpose layer

version: 1.0.0
updated: "2026-05-29"
author: n06_commercial

fallback:
  # When the classifier's best weighted score < min_evidence OR confidence below
  # threshold, it returns this instead of forcing a wrong vertical.
  id: derive_from_purpose
  min_evidence: 2          # minimum weighted signal score to commit to a vertical
  confidence_threshold: 0.50
  description: >
    No pre-seeded template fits with confidence. Derive a bespoke kind/nucleus
    palette directly from the purpose statement + distilled knowledge (Wave C).

